name: marketing-analytics-ai-mcp
description: 'Marketing analytics toolkit: campaign ROI, A/B test analysis, funnel
  optimization, attribution model'
version: 1.0.0
tools:
- name: campaign_roi
  description: Calculate comprehensive campaign ROI including ROAS, CPA, CPC, CPM,
  parameters:
  - name: spend
    type: number
    required: true
  - name: revenue
    type: number
    required: true
  - name: conversions
    type: integer
    required: false
  - name: impressions
    type: integer
    required: false
  - name: clicks
    type: integer
    required: false
  - name: period_days
    type: integer
    required: false
- name: ab_test_analyze
  description: Analyze A/B test results with statistical significance testing.
  parameters:
  - name: visitors_a
    type: integer
    required: true
  - name: conversions_a
    type: integer
    required: true
  - name: visitors_b
    type: integer
    required: true
  - name: conversions_b
    type: integer
    required: true
  - name: confidence_level
    type: number
    required: false
- name: funnel_optimizer
  description: Analyze a conversion funnel and identify the biggest leak point with
  parameters:
  - name: stages
    type: array
    required: true
- name: attribution_model
  description: Apply an attribution model to marketing touchpoints. Distributes conversion
  parameters:
  - name: touchpoints
    type: array
    required: true
  - name: model
    type: string
    required: false
- name: ad_copy_generator
  description: Generate ad copy variants tailored to a specific platform with proper
  parameters:
  - name: product
    type: string
    required: true
  - name: audience
    type: string
    required: true
  - name: platform
    type: string
    required: false
  - name: tone
    type: string
    required: false
  - name: cta
    type: string
    required: false
